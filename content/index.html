<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phandalin — Portal Content Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a05;
    --ink: #1a1208;
    --parch: #f2e8c9;
    --parch-dark: #e8d9a8;
    --parch-mid: #ede0b5;
    --gold: #b8862a;
    --gold-light: #d4a843;
    --rust: #8b2e0a;
    --ash: #3d3020;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'IM Fell English', Georgia, serif;
    min-height: 100vh; padding-bottom: 5rem;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(180,90,10,.15) 0%, transparent 60%),
      radial-gradient(ellipse at 75% 80%, rgba(150,60,5,.10) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .page { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 1.5rem; }
  header { text-align: center; padding: 2.5rem 1.5rem 1.5rem; border-bottom: 1px solid rgba(184,134,42,.2); }
  .header-sub {
    font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .35em;
    color: var(--gold); text-transform: uppercase; margin-bottom: .6rem;
  }
  header h1 {
    font-family: 'Cinzel Decorative', serif; font-weight: 700;
    font-size: clamp(1.6rem, 4.5vw, 2.6rem); color: var(--parch);
    text-shadow: 0 0 24px rgba(180,100,20,.35);
  }
  .session-badge {
    display: inline-block; margin-top: .8rem; font-family: 'Cinzel', serif;
    font-size: .7rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--gold-light); border: 1px solid var(--gold); border-radius: 3px;
    padding: .3rem .9rem;
  }
  .toolrow {
    display: flex; justify-content: center; gap: .7rem; margin: 1.8rem 0; flex-wrap: wrap;
  }
  .btn-secondary, .btn-primary, .btn-ghost {
    font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .08em;
    text-transform: uppercase; padding: .55rem 1rem; border-radius: 3px; cursor: pointer;
    border: 1px solid var(--gold); background: var(--parch-mid); color: var(--ash);
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .btn-primary { background: var(--rust); color: var(--parch); border-color: var(--rust); }
  .btn-ghost { background: transparent; color: var(--gold-light); }
  .btn-danger { border-color: #c0392b; color: #c0392b; background: transparent; }

  nav.tabs { display: flex; justify-content: center; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .tab-btn {
    font-family: 'Cinzel', serif; font-weight: 600; font-size: .72rem; letter-spacing: .08em;
    text-transform: uppercase; color: var(--parch-dark);
    background: linear-gradient(180deg, var(--rust), #6b2308); border: none;
    padding: .65rem 1rem .8rem; cursor: pointer;
    clip-path: polygon(0 0, 100% 0, 100% 78%, 50% 100%, 0 78%);
  }
  .tab-btn.active { background: linear-gradient(180deg, #c44a0a, var(--rust)); color: var(--parch); }

  .scroll-panel {
    background: radial-gradient(ellipse at 50% 0%, var(--parch) 0%, var(--parch-dark) 100%);
    border: 1px solid var(--gold); border-radius: 6px; padding: 1.6rem 1.8rem;
    box-shadow: 0 4px 30px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.3);
  }
  .panel-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; flex-wrap: wrap; gap: .6rem; }
  .panel-actions h2 {
    font-family: 'Cinzel', serif; font-weight: 600; color: var(--rust); font-size: 1.1rem;
  }
  .empty-hint { font-style: italic; color: var(--ash); opacity: .8; padding: 1rem 0; }

  .entry-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.4rem; }
  .entry-card { background: var(--parch-mid); border: 1px solid var(--gold); border-radius: 4px; padding: 1rem 1.1rem; }
  .entry-thumb { width: 100%; max-height: 150px; object-fit: cover; border-radius: 3px; border: 1px solid var(--gold); margin-bottom: .6rem; display: block; }
  .entry-audio { width: 100%; margin: .4rem 0 .6rem; }
  .group-heading {
    font-family: 'Cinzel', serif; font-weight: 600; color: var(--rust); font-size: .9rem;
    letter-spacing: .05em; text-transform: uppercase; margin: 0 0 .6rem; padding-bottom: .3rem;
    border-bottom: 1px solid rgba(184,134,42,.35);
  }
  .upload-preview { display: block; max-width: 100%; max-height: 160px; border-radius: 3px; border: 1px solid var(--gold); margin-bottom: .5rem; }
  .upload-preview-audio { display: block; width: 100%; margin-bottom: .5rem; }
  .upload-hint { font-size: .68rem; opacity: .7; margin: .3rem 0 .4rem; line-height: 1.4; }
  .entry-name { font-family: 'Cinzel', serif; font-weight: 600; color: var(--rust); margin-bottom: .15rem; }
  .entry-meta { font-family: 'Cinzel', serif; font-size: .66rem; letter-spacing: .07em; text-transform: uppercase; color: var(--gold); margin-bottom: .4rem; }
  .entry-desc { font-size: .9rem; line-height: 1.5; color: var(--ink); margin-bottom: .6rem; max-height: 4.6em; overflow: hidden; }
  .entry-actions { display: flex; gap: .4rem; }
  .btn-icon {
    border: 1px solid var(--gold); background: var(--parch); color: var(--ash);
    border-radius: 3px; padding: .25rem .55rem; cursor: pointer; font-size: .85rem;
  }
  .btn-icon.danger { border-color: #c0392b; color: #c0392b; }

  /* modal */
  .overlay {
    display: none; position: fixed; inset: 0; background: rgba(10,6,2,.72);
    z-index: 100; align-items: center; justify-content: center; padding: 1.5rem;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--parch); border: 1px solid var(--gold); border-radius: 6px;
    max-width: 520px; width: 100%; padding: 1.6rem 1.8rem; max-height: 88vh; overflow-y: auto;
  }
  .modal-title { font-family: 'Cinzel', serif; font-weight: 600; color: var(--rust); font-size: 1.1rem; margin-bottom: 1rem; }
  .form-row { margin-bottom: .9rem; }
  .form-row label {
    display: block; font-family: 'Cinzel', serif; font-size: .68rem; letter-spacing: .08em;
    text-transform: uppercase; color: var(--ash); margin-bottom: .3rem;
  }
  .form-row input, .form-row textarea {
    width: 100%; font-family: 'IM Fell English', Georgia, serif; font-size: 1rem;
    padding: .5rem .6rem; border: 1px solid var(--gold); border-radius: 3px; background: var(--parch-dark);
  }
  .form-row textarea { min-height: 5rem; resize: vertical; }
  .modal-actions { display: flex; justify-content: flex-end; gap: .6rem; margin-top: 1rem; }

  #toast {
    display: none; position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: var(--rust); color: var(--parch); font-family: 'Cinzel', serif; font-size: .75rem;
    letter-spacing: .1em; text-transform: uppercase; padding: .6rem 1.2rem; border-radius: 3px;
    z-index: 200; box-shadow: 0 4px 12px rgba(0,0,0,.5);
  }
</style>
</head>
<body>

<div id="toast"></div>

<header>
  <div class="header-sub">Dragons of Icespire Peak · Phandalin</div>
  <h1>Portal Content Manager</h1>
  <div class="session-badge">Redigér spillerportalens indhold</div>
</header>

<div class="page">
  <div class="toolrow">
    <a class="btn-secondary" href="../" style="text-decoration:none;">⚔ Til Builder</a>
    <a class="btn-secondary" href="https://amazingraven.github.io/DnD-Portal/" target="_blank" style="text-decoration:none;">👁 Se live portal</a>
  </div>

  <section class="scroll-panel" style="margin-bottom:1.5rem; padding:1.3rem 1.5rem;">
    <div class="panel-actions" style="margin-bottom:.7rem;">
      <h2 style="font-size:.95rem;">☁ Repo-sync (DnD-Portal)</h2>
    </div>
    <div id="repoTokenArea">
      <input type="password" id="ghTokenInput"
        placeholder="GitHub-token (kun DnD-Portal, Contents: Read and write)"
        style="width:100%; font-family:'IM Fell English',Georgia,serif; font-size:.95rem; padding:.5rem .6rem; border:1px solid var(--gold); border-radius:3px; background:var(--parch-dark); margin-bottom:.6rem;">
      <button class="btn-primary" id="btnSaveToken" style="width:100%;">Gem token</button>
    </div>
    <div id="repoActions" style="display:none;">
      <div style="display:flex; gap:.6rem; flex-wrap:wrap; align-items:center;">
        <button class="btn-primary" id="btnRepoPush">☁ Gem <span id="repoPushLabel"></span> i repo</button>
        <button class="btn-ghost" id="btnClearToken" style="font-size:.62rem; opacity:.75;">Glem token</button>
      </div>
    </div>
  </section>

  <nav class="tabs" id="tabs"></nav>

  <section class="scroll-panel">
    <div class="panel-actions">
      <h2 id="panel-title"></h2>
      <div style="display:flex; gap:.5rem; flex-wrap:wrap;">
        <button class="btn-ghost" id="btn-sync">🔄 Hent nyeste fra portal</button>
        <button class="btn-secondary" id="btn-export">⬇ Eksportér JSON</button>
        <button class="btn-secondary" id="btn-import">⬆ Importér JSON</button>
        <input type="file" id="import-file-input" accept="application/json" style="display:none;">
        <button class="btn-primary" id="btn-add">+ Tilføj</button>
      </div>
    </div>
    <div id="entry-list"></div>
  </section>
</div>

<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Tilføj</div>
    <div id="form-fields"></div>
    <div class="modal-actions">
      <button class="btn-secondary btn-danger" id="btn-delete" style="display:none;">Slet</button>
      <button class="btn-secondary" id="btn-cancel">Annuller</button>
      <button class="btn-primary" id="btn-save">Gem</button>
    </div>
  </div>
</div>

<script>
const PORTAL_BASE = 'https://amazingraven.github.io/DnD-Portal/data/';

const TYPES = {
  npcs: {
    label: 'Folk i kampagnen', file: 'npcs.json', wrapperKey: 'npcs',
    groupBy: { key: 'kind', order: ['NPC', 'Spillerkarakter'],
      headers: { 'NPC': 'NPC\'er', 'Spillerkarakter': 'Spillernes karakterer' } },
    fields: [
      { key: 'name', label: 'Navn', type: 'text', required: true },
      { key: 'kind', label: 'Type', type: 'select', options: ['NPC', 'Spillerkarakter'], required: true },
      { key: 'title', label: 'Titel / rolle', type: 'text' },
      { key: 'location', label: 'Sted', type: 'text' },
      { key: 'description', label: 'Beskrivelse (spoiler-fri)', type: 'textarea' }
    ],
    title: e => e.name,
    meta: e => [e.title, e.location].filter(Boolean).join(' · '),
    desc: e => e.description
  },
  items: {
    label: 'Fund & genstande', file: 'items.json', wrapperKey: 'items',
    fields: [
      { key: 'name', label: 'Navn', type: 'text', required: true },
      { key: 'image', label: 'Billede', type: 'image' },
      { key: 'rarity', label: 'Sjældenhed', type: 'text' },
      { key: 'description', label: 'Beskrivelse (valgfri)', type: 'textarea' }
    ],
    title: e => e.name,
    meta: e => e.rarity || '',
    desc: e => e.description,
    image: e => e.image
  },
  sessions: {
    label: 'Session-logs', file: 'sessions.json', wrapperKey: 'sessions',
    fields: [
      { key: 'title', label: 'Titel', type: 'text', required: true },
      { key: 'number', label: 'Session-nummer', type: 'number' },
      { key: 'date', label: 'Dato', type: 'date' },
      { key: 'recap', label: 'Spoiler-fri opsummering', type: 'textarea' },
      { key: 'audio', label: 'Lydoptagelse', type: 'audio' }
    ],
    title: e => e.title,
    meta: e => [e.number ? ('Session ' + e.number) : '', e.date].filter(Boolean).join(' · '),
    desc: e => e.recap,
    audio: e => e.audio
  }
};

let activeType = 'npcs';
let editState = null; // { type, id, isNew }
let toastTimer = null;

function storageKey(type) { return 'icespire-portal-content-' + type; }

function loadEntries(type) {
  try {
    const raw = localStorage.getItem(storageKey(type));
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}
function saveEntries(type, entries) {
  localStorage.setItem(storageKey(type), JSON.stringify(entries));
}
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2200);
}

function renderTabs() {
  const nav = document.getElementById('tabs');
  nav.innerHTML = Object.entries(TYPES).map(([key, t]) =>
    `<button class="tab-btn ${key === activeType ? 'active' : ''}" data-type="${key}">${esc(t.label)}</button>`
  ).join('');
  nav.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { activeType = btn.dataset.type; renderTabs(); renderList(); });
  });
  const pushLabel = document.getElementById('repoPushLabel');
  if (pushLabel) pushLabel.textContent = TYPES[activeType].label;
}

function entryCardHTML(t, e) {
  return `
    <div class="entry-card">
      ${t.image && t.image(e) ? `<img class="entry-thumb" src="${esc(t.image(e))}" alt="">` : ''}
      <div class="entry-name">${esc(t.title(e) || '(uden navn)')}</div>
      ${t.meta(e) ? `<div class="entry-meta">${esc(t.meta(e))}</div>` : ''}
      ${t.desc(e) ? `<div class="entry-desc">${esc(t.desc(e))}</div>` : ''}
      ${t.audio && t.audio(e) ? `<audio class="entry-audio" controls src="${esc(t.audio(e))}"></audio>` : ''}
      <div class="entry-actions">
        <button class="btn-icon" data-edit="${e._id}" title="Rediger">✎</button>
        <button class="btn-icon danger" data-del="${e._id}" title="Slet">✕</button>
      </div>
    </div>`;
}

function renderList() {
  const t = TYPES[activeType];
  document.getElementById('panel-title').textContent = t.label;
  const entries = loadEntries(activeType);
  const list = document.getElementById('entry-list');
  if (!entries.length) {
    list.innerHTML = `<p class="empty-hint">Ingen ${esc(t.label.toLowerCase())} endnu. Klik "+ Tilføj", eller "🔄 Hent nyeste fra portal" hvis der allerede findes indhold på den live side.</p>`;
    return;
  }
  if (t.groupBy) {
    const g = t.groupBy;
    const groups = {};
    entries.forEach(e => {
      const k = e[g.key] || g.order[0];
      (groups[k] = groups[k] || []).push(e);
    });
    list.innerHTML = g.order.map(k => {
      if (!groups[k] || !groups[k].length) return '';
      return `<h3 class="group-heading">${esc(g.headers[k] || k)}</h3>
        <div class="entry-grid">${groups[k].map(e => entryCardHTML(t, e)).join('')}</div>`;
    }).join('');
  } else {
    list.innerHTML = `<div class="entry-grid">` + entries.map(e => entryCardHTML(t, e)).join('') + `</div>`;
  }
  list.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => openForm(activeType, b.dataset.edit)));
  list.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => {
    if (!confirm('Slet denne post?')) return;
    const remaining = loadEntries(activeType).filter(e => e._id !== b.dataset.del);
    saveEntries(activeType, remaining);
    renderList();
    toast('Slettet');
  }));
}

function renderField(f, entry) {
  const val = entry ? (entry[f.key] ?? '') : '';
  if (f.type === 'textarea') {
    return `<textarea data-key="${f.key}">${esc(val)}</textarea>`;
  }
  if (f.type === 'select') {
    const opts = f.options.map(o => `<option value="${esc(o)}" ${val === o ? 'selected' : ''}>${esc(o)}</option>`).join('');
    return `<select data-key="${f.key}">${opts}</select>`;
  }
  if (f.type === 'image' || f.type === 'audio') {
    const accept = f.type === 'image' ? 'image/*' : 'audio/*';
    const preview = f.type === 'image'
      ? (val ? `<img src="${esc(val)}" class="upload-preview" alt="">` : '')
      : (val ? `<audio src="${esc(val)}" controls class="upload-preview-audio"></audio>` : '');
    return `${preview}
      <input type="file" accept="${accept}" data-upload="${f.key}" data-uploadtype="${f.type}">
      <div class="upload-hint">Vælg en fil for at uploade direkte til repoet (kræver gemt token) — eller indsæt et link manuelt herunder.</div>
      <input type="text" data-key="${f.key}" value="${esc(val)}" placeholder="Link (udfyldes automatisk ved upload)">`;
  }
  return `<input type="${f.type}" data-key="${f.key}" value="${esc(val)}">`;
}

function attachUploadHandlers() {
  document.querySelectorAll('[data-upload]').forEach(input => {
    input.addEventListener('change', async () => {
      const file = input.files[0];
      if (!file) return;
      const key = input.dataset.upload;
      const kind = input.dataset.uploadtype;
      const subdir = kind === 'image' ? 'images' : 'audio';
      if (!ghToken()) {
        alert('Gem en token først i "☁ Repo-sync" øverst på siden — upload kræver skriveadgang til DnD-Portal.');
        input.value = '';
        return;
      }
      const target = document.querySelector(`[data-key="${key}"]`);
      try {
        toast('Uploader…');
        const url = await uploadAssetToRepo(file, subdir);
        target.value = url;
        toast((kind === 'image' ? 'Billede' : 'Lydfil') + ' uploadet ✓');
      } catch (err) {
        alert('Upload fejlede: ' + err.message);
      }
    });
  });
}

function openForm(type, id) {
  const t = TYPES[type];
  const entries = loadEntries(type);
  const entry = id ? entries.find(e => e._id === id) : null;
  editState = { type, id, isNew: !entry };
  document.getElementById('modal-title').textContent = entry ? 'Rediger' : 'Tilføj ny';
  document.getElementById('form-fields').innerHTML = t.fields.map(f => `
    <div class="form-row">
      <label>${esc(f.label)}${f.required ? ' *' : ''}</label>
      ${renderField(f, entry)}
    </div>`).join('');
  document.getElementById('btn-delete').style.display = entry ? 'inline-flex' : 'none';
  document.getElementById('modal-overlay').classList.add('open');
  attachUploadHandlers();
}

function closeForm() {
  document.getElementById('modal-overlay').classList.remove('open');
  editState = null;
}

function saveForm() {
  const t = TYPES[editState.type];
  const values = {};
  let missingRequired = false;
  t.fields.forEach(f => {
    const el = document.querySelector(`[data-key="${f.key}"]`);
    let val = el.value.trim();
    if (f.type === 'number') val = val === '' ? '' : Number(val);
    if (f.required && !val) missingRequired = true;
    values[f.key] = val;
  });
  if (missingRequired) { alert('Udfyld de påkrævede felter (*)'); return; }

  const entries = loadEntries(editState.type);
  if (editState.isNew) {
    values._id = 'c_' + Date.now();
    entries.push(values);
    toast('Tilføjet');
  } else {
    const idx = entries.findIndex(e => e._id === editState.id);
    entries[idx] = { ...entries[idx], ...values };
    toast('Gemt');
  }
  saveEntries(editState.type, entries);
  closeForm();
  renderList();
}

function deleteCurrent() {
  if (!editState || editState.isNew) return;
  if (!confirm('Slet denne post?')) return;
  const entries = loadEntries(editState.type).filter(e => e._id !== editState.id);
  saveEntries(editState.type, entries);
  closeForm();
  renderList();
  toast('Slettet');
}

function exportCurrent() {
  const t = TYPES[activeType];
  const entries = loadEntries(activeType).map(({ _id, ...rest }) => rest);
  const payload = { [t.wrapperKey]: entries };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = t.file;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(t.file + ' eksporteret — send den til Claude for at opdatere portalen');
}

async function syncFromPortal() {
  const t = TYPES[activeType];
  if (loadEntries(activeType).length && !confirm('Dette overskriver dine lokale ændringer for ' + t.label + ' med det, der ligger live på portalen. Fortsæt?')) return;
  try {
    const res = await fetch(PORTAL_BASE + t.file + '?_=' + Date.now());
    if (!res.ok) throw new Error('Kunne ikke hente ' + t.file);
    const data = await res.json();
    const entries = (data[t.wrapperKey] || []).map(e => ({ ...e, _id: 'c_' + Math.random().toString(36).slice(2) }));
    saveEntries(activeType, entries);
    renderList();
    toast('Hentet fra portalen');
  } catch (err) {
    alert('Kunne ikke hente fra portalen: ' + err.message);
  }
}

/* ============================================================
   REPO SYNC — pushes the active tab's entries to the DnD-Portal repo
   (data/<file>.json), so the live spillerportal picks them up.
   Token is stored in localStorage, SCOPED TO THIS ORIGIN ONLY.
   Create it fresh at github.com/settings/tokens?type=beta with:
   Repository access -> Only select repositories -> DnD-Portal
   Permissions -> Contents: Read and write
   ============================================================ */
const GH_OWNER = 'Amazingraven', GH_REPO = 'DnD-Portal', GH_DIR = 'data';
const GH_TOKEN_KEY = 'icespire-gh-token-portal';

function ghToken() { return localStorage.getItem(GH_TOKEN_KEY) || ''; }
function ghHeaders() { return { 'Authorization': 'Bearer ' + ghToken(), 'Accept': 'application/vnd.github+json' }; }
function b64encode(str) { return btoa(unescape(encodeURIComponent(str))); }
function b64decode(b64) { return decodeURIComponent(escape(atob(b64))); }

async function ghGetFile(path) {
  const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}?_=${Date.now()}`;
  const res = await fetch(url, { headers: ghHeaders() });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('GitHub-fejl ' + res.status + ' ved læsning af ' + path);
  const data = await res.json();
  return { sha: data.sha, text: b64decode(data.content || '') };
}
async function ghPutFile(path, contentText, message, sha) {
  const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`;
  const body = { message, content: b64encode(contentText) };
  if (sha) body.sha = sha;
  const res = await fetch(url, { method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body) });
  if (!res.ok) { const t = await res.text(); throw new Error('GitHub-fejl ' + res.status + ': ' + t.slice(0, 140)); }
  return res.json();
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result).split(',')[1]); // strip "data:...;base64," prefix
    r.onerror = () => reject(new Error('Kunne ikke læse filen'));
    r.readAsDataURL(file);
  });
}

// Uploads a binary asset (image/audio) straight to the repo as its own file
// under data/<subdir>/, and returns the public GitHub Pages URL for it.
async function uploadAssetToRepo(file, subdir) {
  if (file.size > 20 * 1024 * 1024) {
    throw new Error('Filen er over 20 MB — GitHub/Pages fungerer dårligt med så store filer. Komprimér eller brug et eksternt link i stedet.');
  }
  const safeName = file.name.toLowerCase().replace(/[^a-z0-9_.-]+/g, '-');
  const path = `${GH_DIR}/${subdir}/${Date.now()}-${safeName}`;
  const base64 = await fileToBase64(file);
  const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: ghHeaders(),
    body: JSON.stringify({ message: 'Upload ' + safeName, content: base64 })
  });
  if (!res.ok) { const t = await res.text(); throw new Error('GitHub-fejl ' + res.status + ': ' + t.slice(0, 140)); }
  return `https://amazingraven.github.io/${GH_REPO}/${path}`;
}

function reflectTokenState() {
  const has = !!ghToken();
  document.getElementById('repoTokenArea').style.display = has ? 'none' : 'block';
  document.getElementById('repoActions').style.display = has ? 'block' : 'none';
}


async function repoPushCurrent() {
  const t = TYPES[activeType];
  if (!ghToken()) { alert('Gem en token først.'); return; }
  const entries = loadEntries(activeType).map(({ _id, ...rest }) => rest);
  const btn = document.getElementById('btnRepoPush'); const old = btn.textContent;
  btn.textContent = 'Gemmer…'; btn.disabled = true;
  try {
    const path = `${GH_DIR}/${t.file}`;
    const payload = { [t.wrapperKey]: entries };
    const existing = await ghGetFile(path);
    await ghPutFile(path, JSON.stringify(payload, null, 2),
      (existing ? 'Opdater' : 'Tilføj') + ' ' + t.label.toLowerCase(), existing ? existing.sha : null);
    toast(t.label + ' gemt i repo ✓ (kan tage et minut før live)');
  } catch (err) {
    alert('Kunne ikke gemme i repo: ' + err.message);
  } finally {
    btn.textContent = old; btn.disabled = false;
  }
}

document.getElementById('btnSaveToken').onclick = () => {
  const v = document.getElementById('ghTokenInput').value.trim();
  if (!v) { alert('Indsæt en token først.'); return; }
  localStorage.setItem(GH_TOKEN_KEY, v);
  document.getElementById('ghTokenInput').value = '';
  reflectTokenState();
  toast('Token gemt i denne browser');
};
document.getElementById('btnClearToken').onclick = () => {
  if (!confirm('Fjern den gemte token fra denne browser?')) return;
  localStorage.removeItem(GH_TOKEN_KEY); reflectTokenState(); toast('Token fjernet');
};
document.getElementById('btnRepoPush').onclick = repoPushCurrent;
reflectTokenState();

document.getElementById('btn-add').addEventListener('click', () => openForm(activeType, null));
document.getElementById('btn-cancel').addEventListener('click', closeForm);
document.getElementById('btn-save').addEventListener('click', saveForm);
document.getElementById('btn-delete').addEventListener('click', deleteCurrent);
function importCurrent(file) {
  const t = TYPES[activeType];
  const reader = new FileReader();
  reader.onload = () => {
    let data;
    try { data = JSON.parse(reader.result); }
    catch (e) { alert('Ugyldig JSON-fil: ' + e.message); return; }
    const list = data[t.wrapperKey];
    if (!Array.isArray(list)) { alert(`Filen mangler nøglen "${t.wrapperKey}" — forventede { "${t.wrapperKey}": [...] }.`); return; }
    const existing = loadEntries(activeType);
    if (existing.length && !confirm(`Dette overskriver dine ${existing.length} lokale ${t.label.toLowerCase()}-poster med de ${list.length} fra filen. Fortsæt?`)) return;
    const entries = list.map(e => ({ ...e, _id: 'c_' + Math.random().toString(36).slice(2) }));
    saveEntries(activeType, entries);
    renderList();
    toast(list.length + ' ' + t.label.toLowerCase() + ' importeret — husk "☁ Gem i repo" for at gøre det live');
  };
  reader.onerror = () => alert('Kunne ikke læse filen.');
  reader.readAsText(file);
}

document.getElementById('btn-export').addEventListener('click', exportCurrent);
document.getElementById('btn-import').addEventListener('click', () => document.getElementById('import-file-input').click());
document.getElementById('import-file-input').addEventListener('change', (ev) => {
  const file = ev.target.files[0];
  if (file) importCurrent(file);
  ev.target.value = '';
});
document.getElementById('btn-sync').addEventListener('click', syncFromPortal);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeForm(); });

renderTabs();
renderList();
</script>
