<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phandalin — Portal Content Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a05;
    --ink: #1a1208;
    --parch: #f2e8c9;
    --parch-dark: #e8d9a8;
    --parch-mid: #ede0b5;
    --gold: #b8862a;
    --gold-light: #d4a843;
    --rust: #8b2e0a;
    --ash: #3d3020;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'IM Fell English', Georgia, serif;
    min-height: 100vh; padding-bottom: 5rem;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(180,90,10,.15) 0%, transparent 60%),
      radial-gradient(ellipse at 75% 80%, rgba(150,60,5,.10) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .page { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 1.5rem; }
  header { text-align: center; padding: 2.5rem 1.5rem 1.5rem; border-bottom: 1px solid rgba(184,134,42,.2); }
  .header-sub {
    font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .35em;
    color: var(--gold); text-transform: uppercase; margin-bottom: .6rem;
  }
  header h1 {
    font-family: 'Cinzel Decorative', serif; font-weight: 700;
    font-size: clamp(1.6rem, 4.5vw, 2.6rem); color: var(--parch);
    text-shadow: 0 0 24px rgba(180,100,20,.35);
  }
  .session-badge {
    display: inline-block; margin-top: .8rem; font-family: 'Cinzel', serif;
    font-size: .7rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--gold-light); border: 1px solid var(--gold); border-radius: 3px;
    padding: .3rem .9rem;
  }
  .toolrow {
    display: flex; justify-content: center; gap: .7rem; margin: 1.8rem 0; flex-wrap: wrap;
  }
  .btn-secondary, .btn-primary, .btn-ghost {
    font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .08em;
    text-transform: uppercase; padding: .55rem 1rem; border-radius: 3px; cursor: pointer;
    border: 1px solid var(--gold); background: var(--parch-mid); color: var(--ash);
    text-decoration: none; display: inline-flex; align-items: center;
  }
  .btn-primary { background: var(--rust); color: var(--parch); border-color: var(--rust); }
  .btn-ghost { background: transparent; color: var(--gold-light); }
  .btn-danger { border-color: #c0392b; color: #c0392b; background: transparent; }

  nav.tabs { display: flex; justify-content: center; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .tab-btn {
    font-family: 'Cinzel', serif; font-weight: 600; font-size: .72rem; letter-spacing: .08em;
    text-transform: uppercase; color: var(--parch-dark);
    background: linear-gradient(180deg, var(--rust), #6b2308); border: none;
    padding: .65rem 1rem .8rem; cursor: pointer;
    clip-path: polygon(0 0, 100% 0, 100% 78%, 50% 100%, 0 78%);
  }
  .tab-btn.active { background: linear-gradient(180deg, #c44a0a, var(--rust)); color: var(--parch); }

  .scroll-panel {
    background: radial-gradient(ellipse at 50% 0%, var(--parch) 0%, var(--parch-dark) 100%);
    border: 1px solid var(--gold); border-radius: 6px; padding: 1.6rem 1.8rem;
    box-shadow: 0 4px 30px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.3);
  }
  .panel-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; flex-wrap: wrap; gap: .6rem; }
  .panel-actions h2 {
    font-family: 'Cinzel', serif; font-weight: 600; color: var(--rust); font-size: 1.1rem;
  }
  .empty-hint { font-style: italic; color: var(--ash); opacity: .8; padding: 1rem 0; }

  .entry-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.4rem; }
  .entry-card { display: flex; gap: 1.1rem; align-items: flex-start; background: var(--parch-mid); border: 1px solid var(--gold); border-radius: 4px; padding: 1rem 1.1rem; }
  .entry-card.entry-hidden { opacity: 0.6; border-style: dashed; border-color: var(--ash); background: repeating-linear-gradient(135deg, var(--parch-mid), var(--parch-mid) 10px, rgba(61,48,32,.06) 10px, rgba(61,48,32,.06) 20px); }
  .entry-media { flex: 0 0 130px; width: 130px; height: 92px; object-fit: cover; border-radius: 3px; border: 1px solid var(--gold); }
  .entry-media-item { flex: 0 0 150px; width: 150px; height: auto; max-height: 210px; object-fit: contain; background: rgba(61,48,32,.07); }
  .entry-body { flex: 1 1 auto; min-width: 0; }
  .entry-audio { width: 100%; margin: .4rem 0 .6rem; }
  .entry-audio-link { font-size: .85rem; margin: .4rem 0 .6rem; }

  .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.4rem; }
  .shop-card { background: var(--parch-mid); border: 1px solid var(--gold); border-radius: 4px; padding: 1rem 1.1rem; transition: opacity .15s; }
  .shop-card.shop-disabled { opacity: .5; }
  .shop-card-main { cursor: pointer; text-align: center; margin-bottom: .7rem; }
  .shop-card.active .shop-card-main { }
  .shop-icon { font-size: 1.5rem; margin-bottom: .4rem; }
  .shop-card-actions { display: flex; gap: .4rem; justify-content: center; align-items: center; }
  .btn-toggle {
    font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .08em; text-transform: uppercase;
    padding: .25rem .6rem; border-radius: 2px; border: 1px solid var(--gold); background: transparent; cursor: pointer;
  }
  .btn-toggle.on { color: #3f7a4f; border-color: #3f7a4f; }
  .btn-toggle.off { color: #b5442f; border-color: #b5442f; }
  .shop-detail-panel { background: var(--parch-mid); border: 1px solid var(--gold); border-radius: 4px; padding: 1.2rem 1.4rem; margin-bottom: 1.4rem; }
  .shop-detail-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .6rem; margin-bottom: 1rem; }
  .shop-detail-keeper { font-style: italic; font-weight: normal; font-size: .85rem; opacity: .8; }
  .shop-item-table { width: 100%; border-collapse: collapse; }
  .shop-item-table th {
    font-family: 'Cinzel', serif; font-size: .62rem; letter-spacing: .1em; text-transform: uppercase;
    color: var(--rust); padding: .5rem .5rem; text-align: left; border-bottom: 1px solid rgba(139,46,10,.3);
  }
  .shop-item-table td { padding: .5rem; vertical-align: top; border-bottom: 1px solid rgba(139,46,10,.12); font-size: .88rem; }
  .shop-item-table tr.sold-out { opacity: .5; }
  .qty-badge { display: inline-block; font-family: 'Cinzel', serif; font-size: .68rem; letter-spacing: .08em; padding: .15rem .5rem; border-radius: 2px; white-space: nowrap; }
  .qty-badge.qty-sold { background: rgba(192,57,43,.15); color: #a5382a; }
  .qty-badge.qty-low { background: rgba(199,126,37,.15); color: #a3691e; }
  .qty-badge.qty-ok { background: rgba(74,124,89,.15); color: #3f7a4f; }

  .map-upload-area { padding: 2rem; text-align: center; }
  .map-toolbar { display: flex; gap: .7rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
  .map-mode-hint { font-size: .78rem; opacity: .85; font-style: italic; }
  .map-wrap { position: relative; width: 100%; border: 1px solid var(--gold); border-radius: 4px; overflow: hidden; margin-bottom: 1.2rem; user-select: none; }
  .map-image { width: 100%; display: block; pointer-events: none; }
  .map-pin { position: absolute; transform: translate(-50%, -100%); display: flex; flex-direction: column; align-items: center; cursor: grab; touch-action: none; }
  .map-pin.dragging { cursor: grabbing; opacity: .85; z-index: 30; }
  .map-pin.dragging .map-pin-dot { transform: scale(1.3); }
  .map-pin-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--rust); border: 2px solid var(--gold-light,var(--gold)); box-shadow: 0 0 6px rgba(0,0,0,.5); }
  .map-pin-label {
    font-family: 'Cinzel', serif; font-size: .65rem; letter-spacing: .03em; white-space: nowrap;
    background: rgba(20,10,0,.78); color: var(--parch,#f2e8c9); padding: .1rem .45rem; border-radius: 2px; margin-top: .2rem;
  }
  .map-pin-list { border-top: 1px solid rgba(184,134,42,.3); padding-top: .8rem; }
  .map-pin-row { display: flex; justify-content: space-between; align-items: center; padding: .4rem 0; border-bottom: 1px solid rgba(184,134,42,.15); }
  .map-pin-row-actions { display: flex; gap: .3rem; align-items: center; }
  .map-pin.map-pin-hidden { opacity: .55; }
  .map-pin.map-pin-hidden .map-pin-dot { background: var(--ash); border-style: dashed; }
  .group-heading {
    font-family: 'Cinzel', serif; font-weight: 600; color: var(--rust); font-size: .9rem;
    letter-spacing: .05em; text-transform: uppercase; margin: 0 0 .6rem; padding-bottom: .3rem;
    border-bottom: 1px solid rgba(184,134,42,.35);
  }
  .upload-preview { display: block; max-width: 100%; max-height: 160px; border-radius: 3px; border: 1px solid var(--gold); margin-bottom: .5rem; }
  .upload-preview-audio { display: block; width: 100%; margin-bottom: .5rem; }
  .upload-pending-note { display: none; font-size: .75rem; opacity: .8; margin-bottom: .5rem; line-height: 1.4; }
  .upload-hint { font-size: .68rem; opacity: .7; margin: .3rem 0 .4rem; line-height: 1.4; }
  .entry-name { font-family: 'Cinzel', serif; font-weight: 600; color: var(--rust); margin-bottom: .15rem; }
  .entry-meta { font-family: 'Cinzel', serif; font-size: .66rem; letter-spacing: .07em; text-transform: uppercase; color: var(--gold); margin-bottom: .4rem; }
  .entry-desc { font-size: .9rem; line-height: 1.5; color: var(--ink); margin-bottom: .6rem; max-height: 4.6em; overflow: hidden; }
  .entry-actions { display: flex; gap: .4rem; }
  .btn-icon {
    border: 1px solid var(--gold); background: var(--parch); color: var(--ash);
    border-radius: 3px; padding: .25rem .55rem; cursor: pointer; font-size: .85rem;
  }
  .btn-icon.danger { border-color: #c0392b; color: #c0392b; }

  /* modal */
  .overlay {
    display: none; position: fixed; inset: 0; background: rgba(10,6,2,.72);
    z-index: 100; align-items: center; justify-content: center; padding: 1.5rem;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--parch); border: 1px solid var(--gold); border-radius: 6px;
    max-width: 520px; width: 100%; padding: 1.6rem 1.8rem; max-height: 88vh; overflow-y: auto;
  }
  .modal-title { font-family: 'Cinzel', serif; font-weight: 600; color: var(--rust); font-size: 1.1rem; margin-bottom: 1rem; }
  .form-row { margin-bottom: .9rem; }
  .form-row label {
    display: block; font-family: 'Cinzel', serif; font-size: .68rem; letter-spacing: .08em;
    text-transform: uppercase; color: var(--ash); margin-bottom: .3rem;
  }
  .form-row input, .form-row textarea {
    width: 100%; font-family: 'IM Fell English', Georgia, serif; font-size: 1rem;
    padding: .5rem .6rem; border: 1px solid var(--gold); border-radius: 3px; background: var(--parch-dark);
  }
  .form-row textarea { min-height: 5rem; resize: vertical; }
  .modal-actions { display: flex; justify-content: flex-end; gap: .6rem; margin-top: 1rem; }

  #toast {
    display: none; position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: var(--rust); color: var(--parch); font-family: 'Cinzel', serif; font-size: .75rem;
    letter-spacing: .1em; text-transform: uppercase; padding: .6rem 1.2rem; border-radius: 3px;
    z-index: 200; box-shadow: 0 4px 12px rgba(0,0,0,.5);
  }
</style>
</head>
<body>

<div id="toast"></div>

<header>
  <div class="header-sub">Dragons of Icespire Peak · Phandalin</div>
  <h1>Portal Content Manager</h1>
  <div class="session-badge">Redigér spillerportalens indhold</div>
</header>

<div class="page">
  <div class="toolrow">
    <a class="btn-secondary" href="../" style="text-decoration:none;">⚔ Til Builder</a>
    <a class="btn-secondary" href="https://amazingraven.github.io/DnD-Portal/" target="_blank" style="text-decoration:none;">👁 Se live portal</a>
  </div>

  <section class="scroll-panel" style="margin-bottom:1.5rem; padding:1.3rem 1.5rem;">
    <div class="panel-actions" style="margin-bottom:.7rem;">
      <h2 style="font-size:.95rem;">☁ Repo-sync (DnD-Portal)</h2>
    </div>
    <div id="repoTokenArea">
      <input type="password" id="ghTokenInput"
        placeholder="GitHub-token (kun DnD-Portal, Contents: Read and write)"
        style="width:100%; font-family:'IM Fell English',Georgia,serif; font-size:.95rem; padding:.5rem .6rem; border:1px solid var(--gold); border-radius:3px; background:var(--parch-dark); margin-bottom:.6rem;">
      <button class="btn-primary" id="btnSaveToken" style="width:100%;">Gem token</button>
    </div>
    <div id="repoActions" style="display:none;">
      <div style="display:flex; gap:.6rem; flex-wrap:wrap; align-items:center;">
        <button class="btn-primary" id="btnRepoPush">☁ Gem <span id="repoPushLabel"></span> i repo</button>
        <button class="btn-primary" id="btnRepoPushAll" title="Gemmer alle faner i repo med ét klik">☁☁ Gem ALT i repo</button>
        <span id="dirtyIndicator" style="font-size:.68rem; opacity:.8;"></span>
        <button class="btn-secondary" id="btnEditLabels">✎ Tilpas overskrifter</button>
        <button class="btn-ghost" id="btnClearToken" style="font-size:.62rem; opacity:.75;">Glem token</button>
      </div>
    </div>
  </section>

  <nav class="tabs" id="tabs"></nav>

  <section class="scroll-panel">
    <div class="panel-actions">
      <h2 id="panel-title"></h2>
      <div style="display:flex; gap:.5rem; flex-wrap:wrap;">
        <button class="btn-ghost" id="btn-sync">🔄 Hent nyeste fra portal</button>
        <button class="btn-secondary" id="btn-export">⬇ Eksportér JSON</button>
        <button class="btn-secondary" id="btn-import">⬆ Importér JSON</button>
        <input type="file" id="import-file-input" accept="application/json" style="display:none;">
        <button class="btn-primary" id="btn-add">+ Tilføj</button>
      </div>
    </div>
    <div id="entry-list"></div>
  </section>
</div>

<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Tilføj</div>
    <div id="form-fields"></div>
    <div class="modal-actions">
      <button class="btn-secondary btn-danger" id="btn-delete" style="display:none;">Slet</button>
      <button class="btn-secondary" id="btn-cancel">Annuller</button>
      <button class="btn-primary" id="btn-save">Gem</button>
    </div>
  </div>
</div>

<script>
const PORTAL_BASE = 'https://amazingraven.github.io/DnD-Portal/data/';

const TYPES = {
  npcs: {
    label: 'Folk i kampagnen', file: 'npcs.json', wrapperKey: 'npcs',
    groupBy: { key: 'kind', order: ['NPC', 'Spillerkarakter'],
      headers: { 'NPC': 'NPC\'er', 'Spillerkarakter': 'Spillernes karakterer' },
      labelKeys: { 'NPC': 'npcs_npc', 'Spillerkarakter': 'npcs_pc' } },
    fields: [
      { key: 'name', label: 'Navn', type: 'text', required: true },
      { key: 'kind', label: 'Type', type: 'select', options: ['NPC', 'Spillerkarakter'], required: true },
      { key: 'image', label: 'Portræt', type: 'image' },
      { key: 'title', label: 'Titel / rolle', type: 'text' },
      { key: 'location', label: 'Sted (fritekst, til beskrivelsen)', type: 'text' },
      { key: 'mapPin', label: 'Sted på kortet (valgfri, kobler til Kort-fanen)', type: 'pin-select' },
      { key: 'description', label: 'Beskrivelse (spoiler-fri)', type: 'textarea' }
    ],
    title: e => e.name,
    meta: e => [e.title, e.location].filter(Boolean).join(' · '),
    desc: e => e.description,
    image: e => e.image,
    imageClass: 'entry-media-item'
  },
  items: {
    label: 'Fund & genstande', file: 'items.json', wrapperKey: 'items',
    fields: [
      { key: 'name', label: 'Navn', type: 'text', required: true },
      { key: 'image', label: 'Billede', type: 'image' },
      { key: 'rarity', label: 'Sjældenhed', type: 'text' },
      { key: 'owner', label: 'Tildel til spillerkarakter', type: 'character-select' },
      { key: 'visibility', label: 'Synlighed på portalen', type: 'select', options: ['Synlig', 'Skjult'], required: true },
      { key: 'description', label: 'Beskrivelse (valgfri)', type: 'textarea' }
    ],
    title: e => e.name,
    meta: e => [e.rarity, e.owner ? ('Ejes af ' + e.owner) : '', e.visibility === 'Skjult' ? '🙈 Skjult for spillerne' : ''].filter(Boolean).join(' · '),
    desc: e => e.description,
    image: e => e.image,
    imageClass: 'entry-media-item'
  },
  sessions: {
    label: 'Session-logs', file: 'sessions.json', wrapperKey: 'sessions',
    fields: [
      { key: 'title', label: 'Titel', type: 'text', required: true },
      { key: 'number', label: 'Session-nummer', type: 'number' },
      { key: 'date', label: 'Dato', type: 'date' },
      { key: 'mapPin', label: 'Sted på kortet (valgfri)', type: 'pin-select' },
      { key: 'image', label: 'Billede (establishing shot / backdrop)', type: 'image' },
      { key: 'recap', label: 'Spoiler-fri opsummering', type: 'textarea' },
      { key: 'audio', label: 'Lydoptagelse', type: 'audio' }
    ],
    title: e => e.title,
    meta: e => [e.number ? ('Session ' + e.number) : '', e.date].filter(Boolean).join(' · '),
    desc: e => e.recap,
    audio: e => e.audio,
    image: e => e.image,
    imageClass: 'entry-media-item'
  },
  personal: {
    label: 'Personligt', file: 'personal.json', wrapperKey: 'personal',
    fields: [
      { key: 'character', label: 'Karakter', type: 'character-select', required: true },
      { key: 'kind', label: 'Type', type: 'select', options: ['Note/Brev', 'Drøm', 'Guddommelig hvisken', 'Fortrolig samtale', 'Oplevelse', 'Andet'], required: true },
      { key: 'title', label: 'Titel', type: 'text', required: true },
      { key: 'content', label: 'Indhold', type: 'textarea' },
      { key: 'image', label: 'Billede (fx et scannet brev)', type: 'image' },
      { key: 'pdf', label: 'PDF-dokument', type: 'pdf' },
      { key: 'date', label: 'Dato / session', type: 'text' }
    ],
    title: e => e.title,
    meta: e => [e.character, e.kind, e.date].filter(Boolean).join(' · '),
    desc: e => e.content,
    image: e => e.image,
    pdf: e => e.pdf
  },
  shops: {
    label: 'Butikker', file: 'shops.json', custom: 'shops'
  },
  map: {
    label: 'Kort', file: 'map.json', custom: 'map'
  }
};

const urlParams = new URLSearchParams(location.search);
const requestedTab = urlParams.get('tab');
let activeType = (requestedTab && TYPES[requestedTab]) ? requestedTab : 'npcs';
let editState = null; // { type, id, isNew }
let toastTimer = null;

function storageKey(type) { return 'icespire-portal-content-' + type; }
const SHOPS_KEY = 'icespire-portal-content-shops';

const LABELS_KEY = 'icespire-portal-content-labels';
function loadCustomLabels() {
  try { const raw = localStorage.getItem(LABELS_KEY); return raw ? JSON.parse(raw) : {}; }
  catch { return {}; }
}
function saveCustomLabels(obj) { localStorage.setItem(LABELS_KEY, JSON.stringify(obj)); }
function getLabel(typeKey) {
  const custom = loadCustomLabels();
  return (custom[typeKey] && custom[typeKey].trim()) || TYPES[typeKey].label;
}
function getGroupLabel(labelKey) {
  if (!labelKey) return null;
  const custom = loadCustomLabels();
  return (custom[labelKey] && custom[labelKey].trim()) || null;
}

function currentSnapshot(type) {
  if (type === 'shops') return loadShops();
  if (type === 'map') return loadMapData();
  return loadEntries(type).map(({ _id, ...rest }) => rest);
}
function markSynced(type) {
  localStorage.setItem('icespire-sync-marker-' + type, JSON.stringify(currentSnapshot(type)));
}
function isDirty(type) {
  const marker = localStorage.getItem('icespire-sync-marker-' + type);
  if (marker === null) return currentSnapshot(type).length > 0; // never synced, but has local data
  return marker !== JSON.stringify(currentSnapshot(type));
}
function updateDirtyIndicator() {
  const el = document.getElementById('dirtyIndicator');
  if (!el) return;
  el.textContent = isDirty(activeType) ? '● Ugemte ændringer — husk at gemme i repo' : '✓ Synkroniseret med repo';
  el.style.color = isDirty(activeType) ? '#b5442f' : '#3f7a4f';
}
function loadShops() {
  try { const raw = localStorage.getItem(SHOPS_KEY); return raw ? JSON.parse(raw) : []; }
  catch { return []; }
}
function saveShops(list) { localStorage.setItem(SHOPS_KEY, JSON.stringify(list)); }
let expandedShopId = null;
let formMode = 'entry'; // 'entry' | 'shop' | 'shopItem'

const MAP_KEY = 'icespire-portal-content-map';
function loadMapData() {
  try { const raw = localStorage.getItem(MAP_KEY); return raw ? JSON.parse(raw) : { image: '', pins: [] }; }
  catch { return { image: '', pins: [] }; }
}
function saveMapData(data) { localStorage.setItem(MAP_KEY, JSON.stringify(data)); }
let mapPlacingMode = false;
let mapMovingPinId = null;
let draggingPinId = null;

function loadEntries(type) {
  try {
    const raw = localStorage.getItem(storageKey(type));
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}
function saveEntries(type, entries) {
  localStorage.setItem(storageKey(type), JSON.stringify(entries));
}
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2200);
}

function renderTabs() {
  const nav = document.getElementById('tabs');
  nav.innerHTML = Object.entries(TYPES).map(([key, t]) =>
    `<button class="tab-btn ${key === activeType ? 'active' : ''}" data-type="${key}">${esc(getLabel(key))}</button>`
  ).join('');
  nav.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { activeType = btn.dataset.type; renderTabs(); renderList(); });
  });
  const pushLabel = document.getElementById('repoPushLabel');
  if (pushLabel) pushLabel.textContent = getLabel(activeType);
}

function entryCardHTML(t, e) {
  const media = t.image && t.image(e) ? `<img class="entry-media ${t.imageClass || ''}" src="${esc(t.image(e))}" alt="">` : '';
  const audioVal = t.audio && t.audio(e);
  const audioHTML = audioVal
    ? (isDirectAudioFile(audioVal)
        ? `<audio class="entry-audio" controls src="${esc(audioVal)}"></audio>`
        : `<div class="entry-audio-link">🔗 <a href="${esc(audioVal)}" target="_blank" rel="noopener">Eksternt link til optagelsen</a></div>`)
    : '';
  const pdfVal = t.pdf && t.pdf(e);
  const pdfHTML = pdfVal ? `<div class="entry-audio-link">📄 <a href="${esc(pdfVal)}" target="_blank" rel="noopener">Åbn PDF</a></div>` : '';
  return `
    <div class="entry-card ${e.visibility === 'Skjult' ? 'entry-hidden' : ''}">
      ${media}
      <div class="entry-body">
        <div class="entry-name">${esc(t.title(e) || '(uden navn)')}</div>
        ${t.meta(e) ? `<div class="entry-meta">${esc(t.meta(e))}</div>` : ''}
        ${t.desc(e) ? `<div class="entry-desc">${esc(t.desc(e))}</div>` : ''}
        ${audioHTML}
        ${pdfHTML}
        <div class="entry-actions">
          <button class="btn-icon" data-move-up="${e._id}" title="Flyt op">▲</button>
          <button class="btn-icon" data-move-down="${e._id}" title="Flyt ned">▼</button>
          <button class="btn-icon" data-edit="${e._id}" title="Rediger">✎</button>
          <button class="btn-icon danger" data-del="${e._id}" title="Slet">✕</button>
        </div>
      </div>
    </div>`;
}

function moveEntry(type, id, dir) {
  const entries = loadEntries(type);
  const t = TYPES[type];
  const idx = entries.findIndex(e => e._id === id);
  if (idx === -1) return;
  if (t.groupBy) {
    const gKey = t.groupBy.key;
    const groupVal = entries[idx][gKey] || t.groupBy.order[0];
    const groupIndices = entries
      .map((e, i) => ({ e, i }))
      .filter(x => (x.e[gKey] || t.groupBy.order[0]) === groupVal)
      .map(x => x.i);
    const posInGroup = groupIndices.indexOf(idx);
    const swapPos = posInGroup + dir;
    if (swapPos < 0 || swapPos >= groupIndices.length) return;
    const otherIdx = groupIndices[swapPos];
    [entries[idx], entries[otherIdx]] = [entries[otherIdx], entries[idx]];
  } else {
    const swapIdx = idx + dir;
    if (swapIdx < 0 || swapIdx >= entries.length) return;
    [entries[idx], entries[swapIdx]] = [entries[swapIdx], entries[idx]];
  }
  saveEntries(type, entries);
  renderList();
}

function renderList() {
  const t = TYPES[activeType];
  document.getElementById('panel-title').textContent = getLabel(activeType);
  document.getElementById('btn-add').textContent = activeType === 'shops' ? '+ Ny butik' : '+ Tilføj';
  document.getElementById('btn-add').style.display = activeType === 'map' ? 'none' : 'inline-flex';
  updateDirtyIndicator();
  if (activeType === 'shops') { renderShopsPanel(); return; }
  if (activeType === 'map') { renderMapPanel(); return; }
  const entries = loadEntries(activeType);
  const list = document.getElementById('entry-list');
  if (!entries.length) {
    list.innerHTML = `<p class="empty-hint">Ingen ${esc(getLabel(activeType).toLowerCase())} endnu. Klik "+ Tilføj", eller "🔄 Hent nyeste fra portal" hvis der allerede findes indhold på den live side.</p>`;
    return;
  }
  if (t.groupBy) {
    const g = t.groupBy;
    const groups = {};
    entries.forEach(e => {
      const k = e[g.key] || g.order[0];
      (groups[k] = groups[k] || []).push(e);
    });
    list.innerHTML = g.order.map(k => {
      if (!groups[k] || !groups[k].length) return '';
      return `<h3 class="group-heading">${esc(getGroupLabel(g.labelKeys && g.labelKeys[k]) || g.headers[k] || k)}</h3>
        <div class="entry-list">${groups[k].map(e => entryCardHTML(t, e)).join('')}</div>`;
    }).join('');
  } else {
    list.innerHTML = `<div class="entry-list">` + entries.map(e => entryCardHTML(t, e)).join('') + `</div>`;
  }
  list.querySelectorAll('[data-move-up]').forEach(b => b.addEventListener('click', () => moveEntry(activeType, b.dataset.moveUp, -1)));
  list.querySelectorAll('[data-move-down]').forEach(b => b.addEventListener('click', () => moveEntry(activeType, b.dataset.moveDown, 1)));
  list.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => openForm(activeType, b.dataset.edit)));
  list.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => {
    if (!confirm('Slet denne post?')) return;
    const remaining = loadEntries(activeType).filter(e => e._id !== b.dataset.del);
    saveEntries(activeType, remaining);
    renderList();
    toast('Slettet');
  }));
}

function renderShopsPanel() {
  const shops = loadShops();
  const list = document.getElementById('entry-list');
  if (!shops.length) {
    list.innerHTML = `<p class="empty-hint">Ingen butikker endnu. Klik "+ Ny butik", eller "🔄 Hent nyeste fra portal" hvis der allerede findes butikker på den live side.</p>`;
    return;
  }
  const grid = `<div class="shop-grid">` + shops.map(shop => {
    const soldOut = shop.items.filter(i => i.qty === 0).length;
    const disabled = shop.enabled === false;
    return `
      <div class="shop-card ${shop.id === expandedShopId ? 'active' : ''} ${disabled ? 'shop-disabled' : ''}">
        <div class="shop-card-main" data-open="${shop.id}">
          <div class="shop-icon">${esc(shop.icon || '⚖️')}</div>
          <div class="entry-name">${esc(shop.name)}</div>
          <div class="entry-meta">${esc(shop.keeper || '')}</div>
          <div class="entry-meta">${shop.items.length} varer${soldOut ? ' · ' + soldOut + ' udsolgt' : ''}</div>
        </div>
        <div class="shop-card-actions">
          <button class="btn-icon" data-shop-up="${shop.id}" title="Flyt op">▲</button>
          <button class="btn-icon" data-shop-down="${shop.id}" title="Flyt ned">▼</button>
          <button class="btn-toggle ${disabled ? 'off' : 'on'}" data-toggle="${shop.id}">${disabled ? 'Skjult' : 'Aktiv'}</button>
          <button class="btn-icon" data-editshop="${shop.id}" title="Rediger butik">✎</button>
          <button class="btn-icon danger" data-delshop="${shop.id}" title="Slet butik">✕</button>
        </div>
      </div>`;
  }).join('') + `</div>`;
  const detail = expandedShopId ? renderShopDetail(shops.find(s => s.id === expandedShopId)) : '';
  list.innerHTML = grid + detail;

  list.querySelectorAll('[data-open]').forEach(el => el.addEventListener('click', () => {
    expandedShopId = expandedShopId === el.dataset.open ? null : el.dataset.open;
    renderShopsPanel();
  }));
  list.querySelectorAll('[data-shop-up]').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); moveShop(btn.dataset.shopUp, -1); }));
  list.querySelectorAll('[data-shop-down]').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); moveShop(btn.dataset.shopDown, 1); }));
  list.querySelectorAll('[data-toggle]').forEach(btn => btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const s2 = loadShops();
    const s = s2.find(x => x.id === btn.dataset.toggle);
    s.enabled = s.enabled === false ? true : false;
    saveShops(s2);
    renderShopsPanel();
    toast(esc(s.name) + (s.enabled === false ? ' skjult for spillerne' : ' aktiveret'));
  }));
  list.querySelectorAll('[data-editshop]').forEach(btn => btn.addEventListener('click', (e) => {
    e.stopPropagation();
    openShopForm(btn.dataset.editshop);
  }));
  list.querySelectorAll('[data-delshop]').forEach(btn => btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!confirm('Slet hele butikken og alle dens varer? Kan ikke fortrydes.')) return;
    const remaining = loadShops().filter(x => x.id !== btn.dataset.delshop);
    saveShops(remaining);
    if (expandedShopId === btn.dataset.delshop) expandedShopId = null;
    renderShopsPanel();
    toast('Butik slettet');
  }));
  wireShopDetailEvents();
}

function moveShop(id, dir) {
  const shops = loadShops();
  const idx = shops.findIndex(s => s.id === id);
  const swapIdx = idx + dir;
  if (idx === -1 || swapIdx < 0 || swapIdx >= shops.length) return;
  [shops[idx], shops[swapIdx]] = [shops[swapIdx], shops[idx]];
  saveShops(shops);
  renderShopsPanel();
}

function renderMapPanel() {
  const data = loadMapData();
  const list = document.getElementById('entry-list');

  if (!data.image) {
    list.innerHTML = `
      <div class="map-upload-area">
        <p class="empty-hint">Upload et kortbillede for at komme i gang. Klik derefter direkte på kortet for at placere steder — ingen koordinater at taste ind.</p>
        <input type="file" accept="image/*" id="mapImageInput">
      </div>`;
    document.getElementById('mapImageInput').addEventListener('change', handleMapImageUpload);
    return;
  }

  const modeHint = mapMovingPinId
    ? '📍 Klik på kortet, hvor stedet skal flyttes hen…'
    : (mapPlacingMode ? '📍 Klik på kortet for at placere det nye sted…' : '');

  list.innerHTML = `
    <div class="map-toolbar">
      <button class="btn-secondary" id="btnMapReplaceImage">🖼 Udskift kortbillede</button>
      <button class="btn-primary" id="btnMapAddPin">${mapPlacingMode ? '✕ Annullér' : '+ Tilføj sted'}</button>
      ${modeHint ? `<span class="map-mode-hint">${modeHint}</span>` : ''}
    </div>
    <input type="file" accept="image/*" id="mapImageInputHidden" style="display:none;">
    <div class="map-wrap" id="mapWrap" style="cursor:${(mapPlacingMode || mapMovingPinId) ? 'crosshair' : 'default'};">
      <img src="${esc(data.image)}" class="map-image" alt="Kort" draggable="false">
      ${data.pins.map(p => `
        <div class="map-pin ${p.hidden ? 'map-pin-hidden' : ''}" data-pin-id="${p.id}" style="left:${p.x}%; top:${p.y}%;">
          <span class="map-pin-dot"></span>
          <span class="map-pin-label">${esc(p.name)}${p.hidden ? ' 🙈' : ''}</span>
        </div>`).join('')}
    </div>
    <div class="map-pin-list">
      <h4 class="pc-section-heading">Alle steder (${data.pins.length})</h4>
      ${data.pins.length ? data.pins.map(p => `
        <div class="map-pin-row">
          <span class="entry-name" style="font-size:.9rem;">${esc(p.name)}</span>
          <span class="map-pin-row-actions">
            <button class="btn-toggle ${p.hidden ? 'off' : 'on'}" data-pin-toggle="${p.id}">${p.hidden ? 'Skjult' : 'Synlig'}</button>
            <button class="btn-icon" data-pin-move="${p.id}" title="Flyt">⇅</button>
            <button class="btn-icon" data-pin-rename="${p.id}" title="Omdøb">✎</button>
            <button class="btn-icon danger" data-pin-delete="${p.id}" title="Slet">✕</button>
          </span>
        </div>`).join('') : '<p class="empty-hint">Ingen steder endnu — klik "+ Tilføj sted" og derefter på kortet.</p>'}
    </div>`;

  document.getElementById('btnMapReplaceImage').addEventListener('click', () => document.getElementById('mapImageInputHidden').click());
  document.getElementById('mapImageInputHidden').addEventListener('change', handleMapImageUpload);
  document.getElementById('btnMapAddPin').addEventListener('click', () => {
    mapPlacingMode = !mapPlacingMode;
    mapMovingPinId = null;
    renderMapPanel();
  });
  document.getElementById('mapWrap').addEventListener('click', (e) => {
    if (e.target.closest('.map-pin')) return;
    if (!mapPlacingMode && !mapMovingPinId) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
    const y = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));
    const d = loadMapData();
    if (mapMovingPinId) {
      const pin = d.pins.find(p => p.id === mapMovingPinId);
      if (pin) { pin.x = Math.round(x * 10) / 10; pin.y = Math.round(y * 10) / 10; saveMapData(d); }
      mapMovingPinId = null;
      renderMapPanel();
    } else if (mapPlacingMode) {
      const name = prompt('Navn på stedet:');
      if (name && name.trim()) {
        d.pins.push({ id: 'pin_' + Math.random().toString(36).slice(2), name: name.trim(), x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10, hidden: false });
        saveMapData(d);
      }
      mapPlacingMode = false;
      renderMapPanel();
    }
  });
  document.querySelectorAll('[data-pin-delete]').forEach(btn => btn.addEventListener('click', () => {
    if (!confirm('Slet dette sted? NPC\'er der peger på det, mister koblingen (men beholder deres fritekst-sted).')) return;
    const d = loadMapData();
    d.pins = d.pins.filter(p => p.id !== btn.dataset.pinDelete);
    saveMapData(d);
    renderMapPanel();
    toast('Sted slettet');
  }));
  document.querySelectorAll('[data-pin-toggle]').forEach(btn => btn.addEventListener('click', () => {
    const d = loadMapData();
    const pin = d.pins.find(p => p.id === btn.dataset.pinToggle);
    if (!pin) return;
    pin.hidden = !pin.hidden;
    saveMapData(d);
    renderMapPanel();
    toast(esc(pin.name) + (pin.hidden ? ' skjult for spillerne' : ' gjort synligt'));
  }));
  document.querySelectorAll('[data-pin-rename]').forEach(btn => btn.addEventListener('click', () => {
    const d = loadMapData();
    const pin = d.pins.find(p => p.id === btn.dataset.pinRename);
    const name = prompt('Nyt navn på stedet:', pin ? pin.name : '');
    if (pin && name && name.trim()) { pin.name = name.trim(); saveMapData(d); renderMapPanel(); toast('Omdøbt'); }
  }));
  document.querySelectorAll('[data-pin-move]').forEach(btn => btn.addEventListener('click', () => {
    mapMovingPinId = btn.dataset.pinMove;
    mapPlacingMode = false;
    renderMapPanel();
  }));
  document.querySelectorAll('.map-pin').forEach(pinEl => {
    const startDrag = (e) => {
      e.preventDefault();
      e.stopPropagation();
      draggingPinId = pinEl.dataset.pinId;
      mapPlacingMode = false;
      mapMovingPinId = null;
      pinEl.classList.add('dragging');
    };
    pinEl.addEventListener('mousedown', startDrag);
    pinEl.addEventListener('touchstart', startDrag, { passive: false });
  });
}

async function handleMapImageUpload(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  if (!ghToken()) { alert('Gem en token først i "☁ Repo-sync" øverst på siden — upload kræver skriveadgang.'); return; }
  try {
    toast('Uploader kort…');
    const url = await uploadAssetToRepo(file, 'images');
    const d = loadMapData();
    d.image = url;
    saveMapData(d);
    renderMapPanel();
    toast('Kort uploadet ✓ (kan tage et minuts tid før synligt)');
  } catch (err) {
    alert('Upload fejlede: ' + err.message);
  }
}

function renderShopDetail(shop) {
  if (!shop) return '';
  const inStock = shop.items.filter(i => i.qty > 0).length;
  return `
    <div class="shop-detail-panel">
      <div class="shop-detail-header">
        <div class="entry-name">${esc(shop.icon || '')} ${esc(shop.name)} <span class="shop-detail-keeper">— ${esc(shop.keeper || '')}</span></div>
        <button class="btn-secondary" data-additem="${shop.id}">+ Tilføj vare</button>
      </div>
      <table class="shop-item-table">
        <thead><tr><th>Genstand</th><th>Antal</th><th>Type</th><th>Pris</th><th>Handling</th></tr></thead>
        <tbody>
          ${shop.items.map(item => `
            <tr class="${item.qty === 0 ? 'sold-out' : ''}">
              <td>
                <div class="entry-name" style="font-size:.9rem;">${esc(item.name)}</div>
                ${item.rules ? `<div class="entry-desc" style="font-size:.8rem;">${esc(item.rules)}</div>` : ''}
              </td>
              <td><span class="qty-badge ${item.qty === 0 ? 'qty-sold' : item.qty <= 2 ? 'qty-low' : 'qty-ok'}">${item.qty === 0 ? 'Udsolgt' : '×' + item.qty}</span></td>
              <td>${esc(item.type || '')}</td>
              <td>${esc(item.price || '')}</td>
              <td>
                <button class="btn-icon" data-item-up="${shop.id}|${item.id}" title="Flyt op">▲</button>
                <button class="btn-icon" data-item-down="${shop.id}|${item.id}" title="Flyt ned">▼</button>
                <button class="btn-icon" data-sell="${shop.id}|${item.id}" title="Solgt (−1)" ${item.qty === 0 ? 'disabled' : ''}>−</button>
                <button class="btn-icon" data-restock="${shop.id}|${item.id}" title="Genopfyld (+1)">+</button>
                <button class="btn-icon" data-edititem="${shop.id}|${item.id}" title="Rediger">✎</button>
                <button class="btn-icon danger" data-delitem="${shop.id}|${item.id}" title="Slet">✕</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
      <div class="entry-meta" style="margin-top:.6rem;">${inStock}/${shop.items.length} varer på lager</div>
    </div>`;
}

function wireShopDetailEvents() {
  const list = document.getElementById('entry-list');
  list.querySelectorAll('[data-additem]').forEach(btn => btn.addEventListener('click', () => openShopItemForm(btn.dataset.additem, null)));
  list.querySelectorAll('[data-item-up]').forEach(btn => btn.addEventListener('click', () => {
    const [shopId, itemId] = btn.dataset.itemUp.split('|');
    moveShopItem(shopId, itemId, -1);
  }));
  list.querySelectorAll('[data-item-down]').forEach(btn => btn.addEventListener('click', () => {
    const [shopId, itemId] = btn.dataset.itemDown.split('|');
    moveShopItem(shopId, itemId, 1);
  }));
  list.querySelectorAll('[data-sell]').forEach(btn => btn.addEventListener('click', () => adjustShopItemQty(btn.dataset.sell, -1)));
  list.querySelectorAll('[data-restock]').forEach(btn => btn.addEventListener('click', () => adjustShopItemQty(btn.dataset.restock, 1)));
  list.querySelectorAll('[data-edititem]').forEach(btn => btn.addEventListener('click', () => {
    const [shopId, itemId] = btn.dataset.edititem.split('|');
    openShopItemForm(shopId, itemId);
  }));
  list.querySelectorAll('[data-delitem]').forEach(btn => btn.addEventListener('click', () => {
    const [shopId, itemId] = btn.dataset.delitem.split('|');
    if (!confirm('Slet denne vare?')) return;
    const shops = loadShops();
    const shop = shops.find(s => s.id === shopId);
    shop.items = shop.items.filter(i => i.id !== itemId);
    saveShops(shops);
    renderShopsPanel();
    toast('Vare slettet');
  }));
}

function adjustShopItemQty(key, delta) {
  const [shopId, itemId] = key.split('|');
  const shops = loadShops();
  const shop = shops.find(s => s.id === shopId);
  const item = shop.items.find(i => i.id === itemId);
  item.qty = Math.max(0, (item.qty || 0) + delta);
  saveShops(shops);
  renderShopsPanel();
}

function moveShopItem(shopId, itemId, dir) {
  const shops = loadShops();
  const shop = shops.find(s => s.id === shopId);
  const idx = shop.items.findIndex(i => i.id === itemId);
  const swapIdx = idx + dir;
  if (idx === -1 || swapIdx < 0 || swapIdx >= shop.items.length) return;
  [shop.items[idx], shop.items[swapIdx]] = [shop.items[swapIdx], shop.items[idx]];
  saveShops(shops);
  renderShopsPanel();
}

const SHOP_FIELDS = [
  { key: 'name', label: 'Navn', type: 'text', required: true },
  { key: 'keeper', label: 'Butiksholder', type: 'text' },
  { key: 'icon', label: 'Ikon (emoji)', type: 'text' },
  { key: 'mapPin', label: 'Sted på kortet (valgfri)', type: 'pin-select' }
];
const SHOP_ITEM_FIELDS = [
  { key: 'name', label: 'Navn', type: 'text', required: true },
  { key: 'qty', label: 'Antal', type: 'number' },
  { key: 'price', label: 'Pris', type: 'text' },
  { key: 'type', label: 'Type', type: 'text' },
  { key: 'rules', label: 'Regler / beskrivelse', type: 'textarea' }
];
let shopEditState = null;     // { id, isNew }
let shopItemEditState = null; // { shopId, itemId, isNew }

function openShopForm(id) {
  const shops = loadShops();
  const shop = id ? shops.find(s => s.id === id) : null;
  shopEditState = { id, isNew: !shop };
  formMode = 'shop';
  document.getElementById('modal-title').textContent = shop ? 'Rediger butik' : 'Ny butik';
  document.getElementById('form-fields').innerHTML = SHOP_FIELDS.map(f => `
    <div class="form-row">
      <label>${esc(f.label)}${f.required ? ' *' : ''}</label>
      ${renderField(f, shop)}
    </div>`).join('');
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
}

function saveShopForm() {
  const name = document.querySelector('[data-key="name"]').value.trim();
  if (!name) { alert('Navn er påkrævet.'); return; }
  const keeper = document.querySelector('[data-key="keeper"]').value.trim();
  const icon = document.querySelector('[data-key="icon"]').value.trim();
  const mapPin = document.querySelector('[data-key="mapPin"]').value.trim();
  const shops = loadShops();
  if (shopEditState.isNew) {
    shops.push({ id: 'shop_' + Math.random().toString(36).slice(2), name, keeper, icon, mapPin, enabled: true, items: [] });
    toast('Butik oprettet');
  } else {
    const shop = shops.find(s => s.id === shopEditState.id);
    shop.name = name; shop.keeper = keeper; shop.icon = icon; shop.mapPin = mapPin;
    toast('Butik opdateret');
  }
  saveShops(shops);
  closeForm();
  renderShopsPanel();
}

function openShopItemForm(shopId, itemId) {
  const shops = loadShops();
  const shop = shops.find(s => s.id === shopId);
  const item = itemId ? shop.items.find(i => i.id === itemId) : null;
  shopItemEditState = { shopId, itemId, isNew: !item };
  formMode = 'shopItem';
  document.getElementById('modal-title').textContent = item ? 'Rediger vare' : 'Tilføj ny vare';
  document.getElementById('form-fields').innerHTML = SHOP_ITEM_FIELDS.map(f => `
    <div class="form-row">
      <label>${esc(f.label)}${f.required ? ' *' : ''}</label>
      ${renderField(f, item)}
    </div>`).join('');
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
}

function renderField(f, entry) {
  const val = entry ? (entry[f.key] ?? '') : '';
  if (f.type === 'textarea') {
    return `<textarea data-key="${f.key}">${esc(val)}</textarea>`;
  }
  if (f.type === 'select') {
    const opts = f.options.map(o => `<option value="${esc(o)}" ${val === o ? 'selected' : ''}>${esc(o)}</option>`).join('');
    return `<select data-key="${f.key}">${opts}</select>`;
  }
  if (f.type === 'character-select') {
    const characters = [...new Set(
      loadEntries('npcs').filter(e => e.kind === 'Spillerkarakter').map(e => e.name).filter(Boolean)
    )];
    const opts = [''].concat(characters).map(o =>
      `<option value="${esc(o)}" ${val === o ? 'selected' : ''}>${o ? esc(o) : '— Ingen / ikke tildelt —'}</option>`
    ).join('');
    return `<select data-key="${f.key}">${opts}</select>` +
      (characters.length === 0 ? '<div class="upload-hint">Ingen spillerkarakterer fundet endnu — opret dem først under "Folk i kampagnen".</div>' : '');
  }
  if (f.type === 'pin-select') {
    const pins = (loadMapData().pins || []).map(p => p.name).filter(Boolean);
    const opts = [''].concat(pins).map(o =>
      `<option value="${esc(o)}" ${val === o ? 'selected' : ''}>${o ? esc(o) : '— Intet sted valgt —'}</option>`
    ).join('');
    return `<select data-key="${f.key}">${opts}</select>` +
      (pins.length === 0 ? '<div class="upload-hint">Ingen steder oprettet endnu — tilføj dem under "Kort".</div>' : '');
  }
  if (f.type === 'image' || f.type === 'audio' || f.type === 'pdf') {
    const accept = f.type === 'image' ? 'image/*' : f.type === 'audio' ? 'audio/*' : 'application/pdf';
    const preview = f.type === 'image'
      ? (val ? `<img src="${esc(val)}" class="upload-preview" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"><div class="upload-pending-note">Billedet kunne ikke indlæses lige nu (kan skyldes at det lige er uploadet) — linket er gemt korrekt.</div>` : '')
      : f.type === 'audio' ? (val ? renderAudioPreview(val) : '')
      : (val ? `<div class="upload-pending-note">📄 PDF gemt: <a href="${esc(val)}" target="_blank" rel="noopener">${esc(val)}</a></div>` : '');
    const hint = f.type === 'image'
      ? 'Vælg en fil for at uploade direkte til repoet (kræver gemt token) — eller indsæt et billed-link manuelt herunder.'
      : f.type === 'audio'
      ? 'Vælg en fil for direkte upload (kræver gemt token) — eller indsæt ET VILKÅRLIGT LINK herunder (NotebookLM, Spotify, direkte mp3-URL m.fl.). Direkte lydfiler afspilles indlejret; andre links vises som en "Lyt her"-knap.'
      : 'Vælg en PDF-fil for at uploade direkte til repoet (kræver gemt token) — eller indsæt et link manuelt herunder. Vises som en indlejret PDF-fremviser på portalen.';
    return `<div class="upload-preview-slot" data-preview-slot="${f.key}">${preview}</div>
      <input type="file" accept="${accept}" data-upload="${f.key}" data-uploadtype="${f.type}">
      <div class="upload-hint">${hint}</div>
      <input type="text" data-key="${f.key}" value="${esc(val)}" placeholder="Link (udfyldes automatisk ved upload, eller indsæt selv)">`;
  }
  return `<input type="${f.type}" data-key="${f.key}" value="${esc(val)}">`;
}

function isDirectAudioFile(url) {
  return /\.(mp3|wav|ogg|m4a|aac|flac|opus)(\?.*)?$/i.test(url || '');
}
function renderAudioPreview(url) {
  if (isDirectAudioFile(url)) return `<audio src="${esc(url)}" controls class="upload-preview-audio"></audio>`;
  return `<div class="upload-preview-audio" style="font-size:.8rem; opacity:.8;">🔗 Eksternt link (vises som "Lyt her"-knap på portalen): <a href="${esc(url)}" target="_blank" rel="noopener">${esc(url)}</a></div>`;
}

function normalizeAssetUrl(url) {
  if (!url) return url;
  let m = url.match(/^https?:\/\/github\.com\/([^\/]+)\/([^\/]+)\/blob\/[^\/]+\/(.+?)(\?.*)?$/i);
  if (m) return `https://${m[1].toLowerCase()}.github.io/${m[2]}/${m[3]}`;
  m = url.match(/^https?:\/\/raw\.githubusercontent\.com\/([^\/]+)\/([^\/]+)\/[^\/]+\/(.+?)(\?.*)?$/i);
  if (m) return `https://${m[1].toLowerCase()}.github.io/${m[2]}/${m[3]}`;
  return url;
}

function attachUploadHandlers() {
  document.querySelectorAll('[data-upload]').forEach(input => {
    const key = input.dataset.upload;
    const kind = input.dataset.uploadtype;
    const target = document.querySelector(`[data-key="${key}"]`);
    if (target) {
      target.addEventListener('blur', () => {
        const raw = target.value.trim();
        const fixed = normalizeAssetUrl(raw);
        if (fixed !== raw && fixed) {
          target.value = fixed;
          const slot = document.querySelector(`[data-preview-slot="${key}"]`);
          if (slot) slot.innerHTML = assetPreviewHTML(kind, fixed, true);
          toast('Link automatisk rettet til den korrekte adresse (var et GitHub-sidelink, ikke selve filen)');
        }
      });
    }
    input.addEventListener('change', async () => {
      const file = input.files[0];
      if (!file) return;
      const subdir = kind === 'image' ? 'images' : kind === 'audio' ? 'audio' : 'documents';
      if (!ghToken()) {
        alert('Gem en token først i "☁ Repo-sync" øverst på siden — upload kræver skriveadgang til DnD-Portal.');
        input.value = '';
        return;
      }
      const slot = document.querySelector(`[data-preview-slot="${key}"]`);
      try {
        toast('Uploader…');
        const url = await uploadAssetToRepo(file, subdir);
        target.value = url;
        if (slot) slot.innerHTML = assetPreviewHTML(kind, url, false);
        const kindLabel = kind === 'image' ? 'Billede' : kind === 'audio' ? 'Lydfil' : 'PDF';
        toast(kindLabel + ' uploadet ✓ (kan tage et minut før det er synligt)');
      } catch (err) {
        alert('Upload fejlede: ' + err.message);
      }
    });
  });
}

function assetPreviewHTML(kind, url, justFixed) {
  if (kind === 'image') {
    const note = justFixed ? 'Billedet kunne ikke indlæses lige nu — linket er rettet og gemt korrekt.' : '✓ Uploadet til repoet. Billedet kan tage et minuts tid om at blive tilgængeligt via GitHub Pages — luk og genåbn formularen om lidt for at se det.';
    return `<img src="${esc(url)}" class="upload-preview" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
      <div class="upload-pending-note">${note}</div>`;
  }
  if (kind === 'audio') return renderAudioPreview(url);
  if (kind === 'pdf') return `<div class="upload-pending-note">📄 PDF gemt: <a href="${esc(url)}" target="_blank" rel="noopener">Åbn i ny fane</a> (kan tage et minuts tid før tilgængelig)</div>`;
  return '';
}

/* ============================================================
   REPO SYNC — pushes the active tab's entries to the DnD-Portal repo
   (data/<file>.json), so the live spillerportal picks them up.
   Token is stored in localStorage, SCOPED TO THIS ORIGIN ONLY.
   Create it fresh at github.com/settings/tokens?type=beta with:
   Repository access -> Only select repositories -> DnD-Portal
   Permissions -> Contents: Read and write
   ============================================================ */
const GH_OWNER = 'Amazingraven', GH_REPO = 'DnD-Portal', GH_DIR = 'data';
const GH_TOKEN_KEY = 'icespire-gh-token-portal';

function ghToken() { return localStorage.getItem(GH_TOKEN_KEY) || ''; }
function ghHeaders() { return { 'Authorization': 'Bearer ' + ghToken(), 'Accept': 'application/vnd.github+json' }; }
function b64encode(str) { return btoa(unescape(encodeURIComponent(str))); }
function b64decode(b64) { return decodeURIComponent(escape(atob(b64))); }

async function ghGetFile(path) {
  const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}?_=${Date.now()}`;
  const res = await fetch(url, { headers: ghHeaders() });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('GitHub-fejl ' + res.status + ' ved læsning af ' + path);
  const data = await res.json();
  return { sha: data.sha, text: b64decode(data.content || '') };
}
async function ghPutFile(path, contentText, message, sha) {
  const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`;
  const body = { message, content: b64encode(contentText) };
  if (sha) body.sha = sha;
  const res = await fetch(url, { method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body) });
  if (!res.ok) { const t = await res.text(); throw new Error('GitHub-fejl ' + res.status + ': ' + t.slice(0, 140)); }
  return res.json();
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result).split(',')[1]); // strip "data:...;base64," prefix
    r.onerror = () => reject(new Error('Kunne ikke læse filen'));
    r.readAsDataURL(file);
  });
}

// Uploads a binary asset (image/audio) straight to the repo as its own file
// under data/<subdir>/, and returns the public GitHub Pages URL for it.
async function uploadAssetToRepo(file, subdir) {
  if (file.size > 20 * 1024 * 1024) {
    throw new Error('Filen er over 20 MB — GitHub/Pages fungerer dårligt med så store filer. Komprimér eller brug et eksternt link i stedet.');
  }
  const safeName = file.name.toLowerCase().replace(/[^a-z0-9_.-]+/g, '-');
  const path = `${GH_DIR}/${subdir}/${Date.now()}-${safeName}`;
  const base64 = await fileToBase64(file);
  const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: ghHeaders(),
    body: JSON.stringify({ message: 'Upload ' + safeName, content: base64 })
  });
  if (!res.ok) { const t = await res.text(); throw new Error('GitHub-fejl ' + res.status + ': ' + t.slice(0, 140)); }
  return `https://amazingraven.github.io/${GH_REPO}/${path}`;
}

async function pushAllToRepo() {
  if (!ghToken()) { alert('Gem en token først.'); return; }
  const btn = document.getElementById('btnRepoPushAll'); const old = btn.textContent;
  btn.textContent = 'Gemmer alt…'; btn.disabled = true;
  const results = [];
  for (const key of Object.keys(TYPES)) {
    const t = TYPES[key];
    try {
      const payload = key === 'shops' ? loadShops()
        : key === 'map' ? loadMapData()
        : { [t.wrapperKey]: loadEntries(key).map(({ _id, ...rest }) => rest) };
      const path = `${GH_DIR}/${t.file}`;
      const existing = await ghGetFile(path);
      await ghPutFile(path, JSON.stringify(payload, null, 2),
        'Gem alt: opdater ' + getLabel(key).toLowerCase(), existing ? existing.sha : null);
      markSynced(key);
      results.push('✓ ' + getLabel(key));
    } catch (err) {
      results.push('✗ ' + getLabel(key) + ' — ' + err.message);
    }
  }
  try {
    const customLabels = loadCustomLabels();
    if (Object.keys(customLabels).length) {
      const path = `${GH_DIR}/labels.json`;
      const existing = await ghGetFile(path);
      await ghPutFile(path, JSON.stringify(customLabels, null, 2),
        'Gem alt: opdater overskrifter', existing ? existing.sha : null);
      results.push('✓ Overskrifter');
    }
  } catch (err) {
    results.push('✗ Overskrifter — ' + err.message);
  }
  btn.textContent = old; btn.disabled = false;
  updateDirtyIndicator();
  const failed = results.some(r => r.startsWith('✗'));
  alert((failed ? '⚠️ Gem alt afsluttet med fejl:\n\n' : '☁ Alt gemt i repo ✓\n\n') + results.join('\n') + (failed ? '' : '\n\n(kan tage et minut før ændringerne er synlige live)'));
}

function pinDragMoveHandler(clientX, clientY) {
  if (!draggingPinId) return;
  const mapWrap = document.getElementById('mapWrap');
  if (!mapWrap) return;
  const rect = mapWrap.getBoundingClientRect();
  const x = Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
  const y = Math.max(0, Math.min(100, ((clientY - rect.top) / rect.height) * 100));
  const pinEl = mapWrap.querySelector(`[data-pin-id="${draggingPinId}"]`);
  if (pinEl) { pinEl.style.left = x + '%'; pinEl.style.top = y + '%'; }
}
function pinDragEndHandler(clientX, clientY) {
  if (!draggingPinId) return;
  const mapWrap = document.getElementById('mapWrap');
  if (mapWrap) {
    const rect = mapWrap.getBoundingClientRect();
    const x = Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
    const y = Math.max(0, Math.min(100, ((clientY - rect.top) / rect.height) * 100));
    const d = loadMapData();
    const pin = d.pins.find(p => p.id === draggingPinId);
    if (pin) { pin.x = Math.round(x * 10) / 10; pin.y = Math.round(y * 10) / 10; saveMapData(d); }
  }
  draggingPinId = null;
  if (activeType === 'map') renderMapPanel();
}
document.addEventListener('mousemove', (e) => pinDragMoveHandler(e.clientX, e.clientY));
document.addEventListener('mouseup', (e) => pinDragEndHandler(e.clientX, e.clientY));
document.addEventListener('touchmove', (e) => {
  if (!draggingPinId) return;
  e.preventDefault();
  const t = e.touches[0];
  pinDragMoveHandler(t.clientX, t.clientY);
}, { passive: false });
document.addEventListener('touchend', (e) => {
  if (!draggingPinId) return;
  const t = e.changedTouches[0];
  pinDragEndHandler(t.clientX, t.clientY);
});

  document.getElementById('modal-title').textContent = 'Tilpas overskrifter';
  document.getElementById('form-fields').innerHTML =
    `<p style="font-size:.8rem; opacity:.8; margin-bottom:.8rem;">Disse navne bruges både her i editoren og som overskrifter på selve spillerportalen. Lad et felt stå tomt for at bruge standardnavnet.</p>` +
    LABEL_FIELDS.map(f => `
      <div class="form-row">
        <label>${esc(f.label)}</label>
        <input type="text" data-key="${f.key}" value="${esc(custom[f.key] || '')}" placeholder="${esc(f.fallback || '')}">
      </div>`).join('');
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
}

async function saveLabelsForm() {
  const values = {};
  LABEL_FIELDS.forEach(f => {
    const el = document.querySelector(`[data-key="${f.key}"]`);
    values[f.key] = el.value.trim();
  });
  saveCustomLabels(values);
  renderTabs();
  renderList();
  closeForm();
  toast('Overskrifter gemt lokalt…');
  if (!ghToken()) {
    toast('Husk: gem en token for at gøre det synligt for spillerne også');
    return;
  }
  try {
    const path = `${GH_DIR}/labels.json`;
    const existing = await ghGetFile(path);
    await ghPutFile(path, JSON.stringify(values, null, 2), 'Opdater overskrifter', existing ? existing.sha : null);
    toast('Overskrifter gemt og pushet til portalen ✓');
  } catch (err) {
    alert('Kunne ikke gemme overskrifter i repo: ' + err.message + '\n\n(De er stadig gemt lokalt her i editoren.)');
  }
}
function importCurrent(file) {
  const t = TYPES[activeType];
  const reader = new FileReader();
  reader.onload = () => {
    let data;
    try { data = JSON.parse(reader.result); }
    catch (e) { alert('Ugyldig JSON-fil: ' + e.message); return; }
    if (activeType === 'shops') {
      if (!Array.isArray(data)) { alert('Filen skal være et array af butikker: [ {...}, {...} ].'); return; }
      const existing = loadShops();
      if (existing.length && !confirm(`Dette overskriver dine ${existing.length} lokale butikker med de ${data.length} fra filen. Fortsæt?`)) return;
      saveShops(data);
      expandedShopId = null;
      renderList();
      toast(data.length + ' butikker importeret — husk "☁ Gem i repo" for at gøre det live');
      return;
    }
    if (activeType === 'map') {
      if (!data || typeof data !== 'object' || Array.isArray(data)) { alert('Filen skal være et objekt: { "image": "...", "pins": [...] }.'); return; }
      const existing = loadMapData();
      if (existing.image && !confirm('Dette overskriver dit lokale kort med filens indhold. Fortsæt?')) return;
      saveMapData({ image: data.image || '', pins: Array.isArray(data.pins) ? data.pins : [] });
      mapPlacingMode = false; mapMovingPinId = null;
      renderList();
      toast('Kort importeret — husk "☁ Gem i repo" for at gøre det live');
      return;
    }
    const list = data[t.wrapperKey];
    if (!Array.isArray(list)) { alert(`Filen mangler nøglen "${t.wrapperKey}" — forventede { "${t.wrapperKey}": [...] }.`); return; }
    const existing = loadEntries(activeType);
    if (existing.length && !confirm(`Dette overskriver dine ${existing.length} lokale ${getLabel(activeType).toLowerCase()}-poster med de ${list.length} fra filen. Fortsæt?`)) return;
    const entries = list.map(e => ({ ...e, _id: 'c_' + Math.random().toString(36).slice(2) }));
    saveEntries(activeType, entries);
    renderList();
    toast(list.length + ' ' + getLabel(activeType).toLowerCase() + ' importeret — husk "☁ Gem i repo" for at gøre det live');
  };
  reader.onerror = () => alert('Kunne ikke læse filen.');
  reader.readAsText(file);
}

document.getElementById('btn-export').addEventListener('click', exportCurrent);
document.getElementById('btn-import').addEventListener('click', () => document.getElementById('import-file-input').click());
document.getElementById('import-file-input').addEventListener('change', (ev) => {
  const file = ev.target.files[0];
  if (file) importCurrent(file);
  ev.target.value = '';
});
document.getElementById('btn-sync').addEventListener('click', syncFromPortal);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeForm(); });

renderTabs();
renderList();
</script>
</body>
</html>
